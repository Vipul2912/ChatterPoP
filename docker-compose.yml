version: "3.8"

services:
  backend:
    build: ./backend
    container_name: backend-service
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=<your-mongodb-uri>
      - JWT_SECRET=<create-secret>
      - CLOUDINARY_CLOUD_NAME=<name-after-creating-cluster>
      - CLOUDINARY_API_KEY=<API-Key>
      - CLOUDINARY_API_SECRET=<API-secret>

  frontend:
    build: ./frontend
    container_name: chatter-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
